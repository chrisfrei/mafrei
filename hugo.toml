baseURL = "https://www.mafrei.ch/"
languageCode = "de-ch"
title = "Marion Frei"
enableRobotsTXT = true

[params]
  description = "Psychosoziale Beratung & Begleitung in der Region Schaffhausen. Hilfe zur Selbsthilfe — wohlwollend und auf Augenhöhe."

[params.theme]
  # Farben
  colorBg          = "#f2ebe4"  # Seitenhintergrund
  colorBg2         = "#e7ded1"  # zweiter Hintergrund (Zitat-Bänder etc.)
  colorInk         = "#231f20"  # Haupttextfarbe
  colorInkSoft     = "#5f5a4d"  # gedämpfte Textfarbe (Fliesstext)
  colorLine        = "#ddd2c2"  # Trennlinien
  colorAccent      = "#6f7d5f"  # Akzentfarbe (Zitate, Icons)
  colorAccentDeep  = "#58664a"  # Akzent dunkel (Buttons, Links, Nav aktiv)
  colorAccentHover = "#47523c"  # Button-Hover

  # Schriften — müssen exakt einem Google-Fonts-Namen entsprechen
  fontSans  = "Nunito"        # Fliesstext, Navigation, Buttons
  fontSerif = "Nunito"        # Überschriften
  fontQuote = "Marcellus"     # Zitate
  fontLogo  = "Varela Round"  # Logo/Markenname oben links

  # Bei Nunito Kursivschnitt (für Zitat-Quellen) mitladen
  googleFonts = [
    "Marcellus",
    "Varela Round",
    "Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400",
  ]

[markup.goldmark.renderer]
  unsafe = true

[minify]
  minifyOutput = true
[minify.tdewolff.html]
  keepDocumentTags = true
  keepEndTags = true
  keepQuotes = true
  keepDefaultAttrVals = true
  keepWhitespace = false
