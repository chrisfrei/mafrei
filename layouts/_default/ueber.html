{{ define "main" }}
<section style="padding:0">
  <div class="ph wrap" style="padding-bottom:0">
    <span class="eyebrow">{{ .Params.eyebrow }}</span>
    <h1>Mit Gelassenheit und Toleranz</h1>
  </div>
  <div class="about wrap" style="padding-top:30px;padding-bottom:110px">
    <img src="{{ .Params.portrait | relURL }}" alt="{{ .Params.portrait_alt }}" class="portrait" />
    <div class="txt">
      <p class="role">{{ .Params.role }}</p>
      {{ .Content }}
      <div class="creds">
        <h5>{{ .Params.creds_heading }}</h5>
        {{ range .Params.creds }}<div class="cred"><span class="ci">—</span>{{ . }}</div>{{ end }}
      </div>
    </div>
  </div>
</section>
<section class="q-band">
  <div class="wrap">
    <blockquote>{{ .Params.quote_band.text }}</blockquote>
    <cite>{{ .Params.quote_band.source }}</cite>
  </div>
</section>
{{ end }}
