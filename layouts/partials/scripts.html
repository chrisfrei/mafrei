<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  // Damit Einladungs-/Passwort-zurücksetzen-Links, die auf der normalen Seite
  // landen (statt auf /admin/), trotzdem den Login-/Passwort-Dialog öffnen.
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function(user){
      if (!user) {
        window.netlifyIdentity.on("login", function(){
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
<script>
  (function(){
    var menu=document.getElementById('menu');
    var burger=document.getElementById('burger');
    if(burger&&menu){burger.addEventListener('click',function(){menu.classList.toggle('open');});}

    var form=document.getElementById('b-form');
    if(form){
      form.addEventListener('submit',function(e){
        e.preventDefault();
        var data=new FormData(form);
        fetch('/',{
          method:'POST',
          headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:new URLSearchParams(data).toString()
        }).then(function(){
          var ok=document.getElementById('b-ok');
          if(ok)ok.style.display='block';
          var btn=form.querySelector('button[type=submit]');
          if(btn)btn.textContent='Gesendet ✓';
          form.reset();
        }).catch(function(){
          alert('Senden fehlgeschlagen. Bitte versuche es erneut oder schreibe direkt eine E-Mail.');
        });
      });
    }

  })();
</script>
